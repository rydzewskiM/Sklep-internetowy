services:
  db:
    image: postgres:16-alpine
    container_name: bookstore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: bookstore-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bookstore:bookstore@db:5432/bookstore?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: 4000
      ADMIN_EMAIL: admin@bookstore.local
      ADMIN_PASSWORD: Admin123!
    ports:
      - "4000:4000"
    command: sh -c "npx prisma generate && npx prisma db push && npm run prisma:seed && npm run start"

  frontend:
    build:
      context: ./frontend
    container_name: bookstore-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data: